# CI Completa - Trabalho de Conclusão

name: Pipeline - Testes Backend e Frontend

on:
  workflow_dispatch: #Execução manual

  push:
    branches: [ main ] #Execução em push para a branch main

  schedule:
    - cron: '*/10 * * * *' # Execução agendada

jobs:
  unitarios:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app:
          - name: backend
            test: test:backend
            junit: backend/test-results/backend-junit.xml
            coverage: backend/coverage

          - name: frontend
            test: test:frontend
            junit: frontend/test-results/frontend-junit.xml
            coverage: frontend/coverage

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5 

      - name: Configurar Node.js
        uses: actions/setup-node@v6 
        with:
          node-version: 24.x
      
      - name: Instalar dependências
        run: npm ci #Roda mais rápido por usar o -lock e evita conflito de versões

      - name: Executar testes (${{ matrix.app.name }})
        run: npm run ${{ matrix.app.test }}
      
      - name: Publicar resultados de teste
        if: always() # Garante que os resultados sejam publicados mesmo se os testes falharem
        uses: dorny/test-reporter@v2
        with:
          name: ${{ matrix.app.name }}-test-results
          path: ${{ matrix.app.junit }}
          reporter: java-junit
      
      - name: Salvando coverage
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          path: ${{ matrix.app.coverage }}
          name: ${{ matrix.app.name }}-coverage
  
  e2e:
    runs-on: ubuntu-latest
    needs: [unitarios]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5 

      - name: Configurar Node.js
        uses: actions/setup-node@v6 
        with:
          node-version: 24.x
      
      - name: Instalar dependências
        run: npm ci 

      - name: Iniciar servidor backend
        run: npm run start:backend & # Inicia em background para continuar com os próximos passos

      - name: Iniciar servidor frontend
        run: npm run start:frontend & # Inicia em background para continuar com os próximos passos
      
      - name: Aguardar aplicação estar pronta
        run: npx wait-on http://localhost:3000 http://localhost:4000/health

      - name: Instala Browser do Playwright
        run: npx playwright install --with-deps

      - name: Executar testes E2E
        run: npm run test:e2e

      - name: Publicar resultados de teste E2E
        if: always() 
        uses: dorny/test-reporter@v2
        with:
          name: e2e-test-results
          path: e2e/test-results/results.xml
          reporter: java-junit
      
      - name: Salvando report de teste E2E
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: e2e/test-report

      - name: Upload do relatório para GH Pages
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: e2e/test-report

  deploy:
    runs-on: ubuntu-latest
    needs: [e2e]

    steps:
      - name: Simulação de Deploy
        run: echo 'Deploy sendo realizado...'